name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (ordre topologique)
        run: pnpm -r run build

      - name: Typecheck strict
        run: pnpm -r run typecheck

      - name: Tests (unitaires + contract tests)
        run: pnpm -r run test
